<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accounting Dashboard</title>
    <script src="sql-wasm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .total-card {
            background: linear-gradient(145deg, var(--surface-color), #273549);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px var(--primary-glow);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .total-card h2 {
            margin: 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .total-card .amount {
            font-size: 48px;
            font-weight: 700;
            margin: 12px 0 0 0;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .receipt-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        .receipt-card {
            background-color: var(--surface-color);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, background-color 0.2s;
            animation: fadeIn 0.5s ease-out;
            animation-fill-mode: both;
        }

        .receipt-card:active {
            transform: scale(0.98);
            background-color: #273549;
        }

        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .receipt-vendor {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .receipt-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        .receipt-total {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            background: linear-gradient(135deg, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .receipt-items {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            padding: 14px;
            margin-top: 16px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .item-row:last-child {
            margin-bottom: 0;
        }

        .item-qty {
            opacity: 0.6;
            margin-right: 6px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
            animation: pulse 1.5s infinite;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .receipt-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px;
        }

        .btn-action {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-action:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
        }

        .btn-edit:hover {
            color: var(--primary);
            border-color: var(--primary-glow);
        }

        .btn-delete:hover {
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Accounting</h1>
    </div>

    <div class="total-card">
        <h2>Total Expenses</h2>
        <div class="amount" id="grand-total">...</div>
    </div>

    <div class="receipt-list" id="receipt-list">
        <div class="loading">Loading your records...</div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h2 style="margin: 0 0 20px 0; font-size: 18px;">Edit Receipt</h2>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Vendor</label>
                <input type="text" id="edit-vendor">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="edit-date">
            </div>
            <div class="form-group">
                <label>Total ($)</label>
                <input type="number" step="0.01" id="edit-total">
            </div>
            <div class="form-group">
                <label>Items (JSON format)</label>
                <textarea id="edit-items" rows="4"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-action" onclick="closeEditModal()">Cancel</button>
                <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        function loadFromIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("AccountingDB", 1);
                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("sqlite")) {
                        db.createObjectStore("sqlite");
                    }
                };
                request.onsuccess = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("sqlite")) {
                        resolve(undefined);
                        return;
                    }
                    const tx = db.transaction("sqlite", "readonly");
                    const store = tx.objectStore("sqlite");
                    const getReq = store.get("db_file");
                    getReq.onsuccess = function() { resolve(getReq.result); };
                    getReq.onerror = function() { reject(getReq.error); };
                };
                request.onerror = function(event) { reject(event.target.error); };
            });
        }

        function saveToIndexedDB(buffer) {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("AccountingDB", 1);
                request.onsuccess = function(event) {
                    const db = event.target.result;
                    const tx = db.transaction("sqlite", "readwrite");
                    const store = tx.objectStore("sqlite");
                    const putReq = store.put(buffer, "db_file");
                    putReq.onsuccess = function() { resolve(); };
                    putReq.onerror = function() { reject(putReq.error); };
                };
                request.onerror = function(event) { reject(event.target.error); };
            });
        }

        let AppSQL = null;

        async function getDatabase() {
            if (!AppSQL) AppSQL = await initSqlJs({ locateFile: file => file });
            const savedDb = await loadFromIndexedDB();
            return new AppSQL.Database(savedDb || []);
        }

        async function initDashboard() {
            try {
                if (!AppSQL) {
                    AppSQL = await initSqlJs({ locateFile: file => file });
                }
                
                const savedDb = await loadFromIndexedDB();
                if (!savedDb) {
                    document.getElementById('grand-total').innerText = '$0.00';
                    document.getElementById('receipt-list').innerHTML = '<div class="loading" style="animation:none;">No receipts found yet. Add one!</div>';
                    return;
                }
                
                const db = new AppSQL.Database(savedDb);
                
                // Read from DB
                const results = db.exec("SELECT id, vendor, total, date, items FROM receipts ORDER BY date DESC, id DESC");
                
                if (results.length === 0) {
                    document.getElementById('grand-total').innerText = '$0.00';
                    document.getElementById('receipt-list').innerHTML = '<div class="loading" style="animation:none;">No receipts found.</div>';
                    return;
                }
                
                const columns = results[0].columns;
                const values = results[0].values;
                
                let grandTotal = 0;
                let html = '';
                
                values.forEach((row, index) => {
                    const vendor = row[columns.indexOf('vendor')];
                    const total = row[columns.indexOf('total')];
                    const date = row[columns.indexOf('date')];
                    let items = [];
                    try {
                        items = JSON.parse(row[columns.indexOf('items')]);
                    } catch (e) {}
                    
                    grandTotal += (total || 0);
                    
                    let itemsHtml = '';
                    if (items && items.length > 0) {
                        itemsHtml = `<div class="receipt-items">`;
                        items.forEach(item => {
                            const itemName = item.name || 'Item';
                            const itemPrice = item.price || 0;
                            const qty = item.quantity || 1;
                            itemsHtml += `
                                <div class="item-row">
                                    <span><span class="item-qty">${qty}x</span> ${escapeHtml(itemName)}</span>
                                    <span>$${Number(itemPrice * qty).toFixed(2)}</span>
                                </div>
                            `;
                        });
                        itemsHtml += `</div>`;
                    }
                    
                    const id = row[columns.indexOf('id')];
                    const encodedVendor = encodeURIComponent(vendor);
                    const encodedDate = encodeURIComponent(date);
                    const encodedItems = encodeURIComponent(row[columns.indexOf('items')]);

                    html += `
                        <div class="receipt-card" style="animation-delay: ${index * 0.08}s">
                            <div class="receipt-header">
                                <div>
                                    <div class="receipt-vendor">${escapeHtml(vendor)}</div>
                                    <div class="receipt-date">${escapeHtml(date)}</div>
                                </div>
                                <div class="receipt-total">$${Number(total || 0).toFixed(2)}</div>
                            </div>
                            ${itemsHtml}
                            <div class="receipt-actions">
                                <button class="btn-action btn-edit" onclick="openEditModal(${id}, '${encodedVendor}', ${total || 0}, '${encodedDate}', '${encodedItems}')">Edit</button>
                                <button class="btn-action btn-delete" onclick="deleteReceipt(${id})">Delete</button>
                            </div>
                        </div>
                    `;
                });
                
                // Animate total amount counting up
                document.getElementById('grand-total').innerText = `$${grandTotal.toFixed(2)}`;
                document.getElementById('receipt-list').innerHTML = html;
                
            } catch(e) {
                document.getElementById('receipt-list').innerHTML = `<div class="loading" style="color:var(--danger); animation:none;">Storage error: ${e.message}</div>`;
                console.error(e);
            }
        }
        
        async function deleteReceipt(id) {
            if (!confirm("Are you sure you want to delete this receipt?")) return;
            try {
                const db = await getDatabase();
                db.run("DELETE FROM receipts WHERE id = ?", [id]);
                await saveToIndexedDB(db.export());
                initDashboard();
            } catch(e) {
                alert("Error deleting: " + e.message);
            }
        }

        function openEditModal(id, vendorEnc, total, dateEnc, itemsEnc) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-vendor').value = decodeURIComponent(vendorEnc);
            document.getElementById('edit-date').value = decodeURIComponent(dateEnc);
            document.getElementById('edit-total').value = total;
            
            let itemsStr = decodeURIComponent(itemsEnc);
            try {
                const obj = JSON.parse(itemsStr);
                itemsStr = JSON.stringify(obj, null, 2);
            } catch(e) {}
            
            document.getElementById('edit-items').value = itemsStr;
            document.getElementById('edit-modal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const vendor = document.getElementById('edit-vendor').value;
            const date = document.getElementById('edit-date').value;
            const total = parseFloat(document.getElementById('edit-total').value) || 0;
            const items = document.getElementById('edit-items').value || '[]';
            
            try {
                JSON.parse(items);
            } catch(e) {
                alert("Invalid JSON in Items field.");
                return;
            }

            try {
                const db = await getDatabase();
                db.run("UPDATE receipts SET vendor=?, date=?, total=?, items=? WHERE id=?", [vendor, date, total, items, id]);
                await saveToIndexedDB(db.export());
                closeEditModal();
                initDashboard();
            } catch(e) {
                alert("Error updating: " + e.message);
            }
        }

        function escapeHtml(unsafe) {
            return (unsafe || '').toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
