<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accounting Dashboard</title>
    <script src="sql-wasm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .total-card {
            background: linear-gradient(145deg, var(--surface-color), #273549);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px var(--primary-glow);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .total-card h2 {
            margin: 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .total-card .amount {
            font-size: 48px;
            font-weight: 700;
            margin: 12px 0 0 0;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .receipt-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        .receipt-card {
            background-color: var(--surface-color);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, background-color 0.2s;
            animation: fadeIn 0.5s ease-out;
            animation-fill-mode: both;
        }

        .receipt-card:active {
            transform: scale(0.98);
            background-color: #273549;
        }

        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .receipt-vendor {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .receipt-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        .receipt-total {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            background: linear-gradient(135deg, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .receipt-items {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            padding: 14px;
            margin-top: 16px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .item-row:last-child {
            margin-bottom: 0;
        }

        .item-qty {
            opacity: 0.6;
            margin-right: 6px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
            animation: pulse 1.5s infinite;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Accounting</h1>
    </div>

    <div class="total-card">
        <h2>Total Expenses</h2>
        <div class="amount" id="grand-total">...</div>
    </div>

    <div class="receipt-list" id="receipt-list">
        <div class="loading">Loading your records...</div>
    </div>

    <script>
        function loadFromIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("AccountingDB", 1);
                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("sqlite")) {
                        db.createObjectStore("sqlite");
                    }
                };
                request.onsuccess = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains("sqlite")) {
                        resolve(undefined);
                        return;
                    }
                    const tx = db.transaction("sqlite", "readonly");
                    const store = tx.objectStore("sqlite");
                    const getReq = store.get("db_file");
                    getReq.onsuccess = function() { resolve(getReq.result); };
                    getReq.onerror = function() { reject(getReq.error); };
                };
                request.onerror = function(event) { reject(event.target.error); };
            });
        }

        async function initDashboard() {
            try {
                const SQL = await initSqlJs({
                    locateFile: file => file // loads sql-wasm.wasm
                });
                
                const savedDb = await loadFromIndexedDB();
                if (!savedDb) {
                    document.getElementById('grand-total').innerText = '$0.00';
                    document.getElementById('receipt-list').innerHTML = '<div class="loading" style="animation:none;">No receipts found yet. Add one!</div>';
                    return;
                }
                
                const db = new SQL.Database(savedDb);
                
                // Read from DB
                const results = db.exec("SELECT id, vendor, total, date, items FROM receipts ORDER BY date DESC, id DESC");
                
                if (results.length === 0) {
                    document.getElementById('grand-total').innerText = '$0.00';
                    document.getElementById('receipt-list').innerHTML = '<div class="loading" style="animation:none;">No receipts found.</div>';
                    return;
                }
                
                const columns = results[0].columns;
                const values = results[0].values;
                
                let grandTotal = 0;
                let html = '';
                
                values.forEach((row, index) => {
                    const vendor = row[columns.indexOf('vendor')];
                    const total = row[columns.indexOf('total')];
                    const date = row[columns.indexOf('date')];
                    let items = [];
                    try {
                        items = JSON.parse(row[columns.indexOf('items')]);
                    } catch (e) {}
                    
                    grandTotal += (total || 0);
                    
                    let itemsHtml = '';
                    if (items && items.length > 0) {
                        itemsHtml = `<div class="receipt-items">`;
                        items.forEach(item => {
                            const itemName = item.name || 'Item';
                            const itemPrice = item.price || 0;
                            const qty = item.quantity || 1;
                            itemsHtml += `
                                <div class="item-row">
                                    <span><span class="item-qty">${qty}x</span> ${escapeHtml(itemName)}</span>
                                    <span>$${Number(itemPrice * qty).toFixed(2)}</span>
                                </div>
                            `;
                        });
                        itemsHtml += `</div>`;
                    }
                    
                    html += `
                        <div class="receipt-card" style="animation-delay: ${index * 0.08}s">
                            <div class="receipt-header">
                                <div>
                                    <div class="receipt-vendor">${escapeHtml(vendor)}</div>
                                    <div class="receipt-date">${escapeHtml(date)}</div>
                                </div>
                                <div class="receipt-total">$${Number(total || 0).toFixed(2)}</div>
                            </div>
                            ${itemsHtml}
                        </div>
                    `;
                });
                
                // Animate total amount counting up
                document.getElementById('grand-total').innerText = `$${grandTotal.toFixed(2)}`;
                document.getElementById('receipt-list').innerHTML = html;
                
            } catch(e) {
                document.getElementById('receipt-list').innerHTML = `<div class="loading" style="color:var(--danger); animation:none;">Storage error: ${e.message}</div>`;
                console.error(e);
            }
        }
        
        function escapeHtml(unsafe) {
            return (unsafe || '').toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
